<!DOCTYPE html>
<html lang="es" class="transition-colors duration-500">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Gestor de Tareas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen flex items-start justify-center p-3 sm:p-6 lg:p-8">

  <!-- Banner de error de red (fijo arriba) -->
  <div id="networkError" class="network-error-banner"></div>

  <div class="card w-full max-w-2xl p-5 sm:p-7 lg:p-9 rounded-2xl mt-4 sm:mt-8">

    <!-- ── Cabecera ─────────────────────────────────────────────── -->
    <header class="mb-6">
      <div class="flex items-center justify-between mb-1">
        <h1 class="brand text-3xl sm:text-4xl text-gray-900 dark:text-white">TaskFlow</h1>
        <button id="darkModeBtn" class="toggle-pill" aria-label="Cambiar tema">
          <span id="darkIcon">🌙</span>
          <span id="darkLabel">Noche</span>
        </button>
      </div>
      <p class="text-sm text-gray-500 dark:text-gray-400">Organiza tu día de forma eficiente</p>
    </header>

    <!-- ── Formulario de nueva tarea ────────────────────────────── -->
    <section aria-label="Añadir tarea" class="flex flex-col gap-3 mb-5">

      <div>
        <input id="taskInput" type="text" maxlength="120"
          placeholder="¿Qué tienes que hacer hoy?"
          class="field" aria-label="Nombre de la tarea" autocomplete="off" />
        <p class="field-error-msg" id="inputError">El nombre de la tarea no puede estar vacío.</p>
      </div>

      <div class="flex flex-col sm:flex-row gap-2 sm:gap-3">
        <select id="categorySelector" class="field" aria-label="Categoría">
          <option value="General">📋 General</option>
          <option value="Trabajo">💼 Trabajo</option>
          <option value="Estudio">📚 Estudio</option>
          <option value="Personal">🏠 Personal</option>
        </select>

        <select id="prioritySelector" class="field" aria-label="Prioridad">
          <option value="urgent">🔴 Urgente</option>
          <option value="progress">🟡 En progreso</option>
          <option value="optional">🟢 Opcional</option>
        </select>

        <div class="due-date-row sm:flex-1">
          <label for="dueDateInput" class="due-date-label">
            📅 <span class="due-date-optional hidden sm:inline">Fecha límite</span>
          </label>
          <input id="dueDateInput" type="date" class="field due-date-field"
                 aria-label="Fecha límite de la tarea" />
        </div>
      </div>

      <button id="addBtn" class="btn-primary self-stretch sm:self-end sm:px-8">
        + Añadir tarea
      </button>
    </section>

    <!-- ── Filtros + Acciones masivas ────────────────────────────── -->
    <div class="flex flex-col sm:flex-row gap-2 sm:items-center sm:justify-between mb-4">
      <nav aria-label="Filtros de tareas" class="flex gap-2">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="pending">Pendientes</button>
        <button class="filter-btn" data-filter="completed">Completadas</button>
      </nav>

      <div class="bulk-actions" aria-label="Acciones masivas">
        <button id="completeAllBtn" class="bulk-btn bulk-btn-complete hidden">
          ✔ Completar todas
        </button>
        <button id="deleteAllBtn" class="bulk-btn bulk-btn-delete hidden">
          ✖ Eliminar todas
        </button>
      </div>
    </div>

    <!-- ── Indicador de carga ─────────────────────────────────────── -->
    <div id="loadingIndicator" class="loading-indicator" style="display:none">
      <div class="loading-spinner"></div>
      <span>Cargando tareas...</span>
    </div>

    <!-- ── Lista de tareas ───────────────────────────────────────── -->
    <ul id="taskList" role="list" aria-label="Lista de tareas"
        class="space-y-2 overflow-y-auto pr-0.5 task-list"></ul>

    <!-- ── Contador ──────────────────────────────────────────────── -->
    <footer class="flex justify-center mt-5">
      <div class="counter-chip">
        <span>⏳</span>
        <span id="taskCounter">0</span>
        <span>pendiente(s)</span>
      </div>
    </footer>

    <!-- ── Botón estadísticas ────────────────────────────────────── -->
    <div class="flex justify-center mt-3">
      <button id="statsBtn" class="stats-toggle-btn" aria-expanded="false" aria-controls="statsPanel">
        <span id="statsIcon">📊</span>
        <span>Estadísticas</span>
      </button>
    </div>

    <!-- ── Panel de estadísticas ─────────────────────────────────── -->
    <div id="statsPanel" class="stats-panel" aria-live="polite"></div>

  </div>

  <!-- ── Toast de undo ────────────────────────────────────────────── -->
  <div id="undoToast" role="status" aria-live="polite">
    <div id="undoProgressBar"></div>
    <div class="undo-toast-body">
      <span id="undoMsg"></span>
      <button id="undoBtn">Deshacer</button>
    </div>
  </div>

  <!--
    type="module" permite usar import/export entre archivos JS.
    El script se carga de forma diferida automáticamente (equivale a defer).
  -->
  <script type="module" src="app.js"></script>
</body>
</html>
