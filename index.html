<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Tareas - Selects Flotantes</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="theme-default min-h-screen flex items-center justify-center transition-colors duration-500">

<div class="container bg-white dark:bg-gray-900 w-full max-w-sm p-8 rounded-xl shadow-2xl transition-colors duration-500">
  <!-- Header -->
  <header class="text-center mb-6">
    <h1 class="text-2xl font-semibold text-gray-800 dark:text-gray-100">Gestor de Tareas</h1>
    <p class="text-sm text-gray-500 dark:text-gray-300 mb-2">Organiza tu día de forma eficiente</p>
    <div class="flex justify-center gap-2 mb-2">
      <button id="darkModeBtn" class="px-3 py-1 bg-gray-800 text-white rounded hover:bg-gray-700 transition">🌙 Modo fúnebre</button>
      <div class="relative w-32">
        <button id="themeSelectorBtn" class="w-full text-left px-3 py-1 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white flex justify-between items-center">
          Tema: Predeterminado
          <span class="ml-2">▾</span>
        </button>
        <ul id="themeDropdown" class="absolute z-10 hidden w-full mt-1 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded shadow-lg overflow-hidden transition-all">
          <li class="px-3 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer" data-value="default">Predeterminado</li>
          <li class="px-3 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer" data-value="warm">Cálido</li>
          <li class="px-3 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer" data-value="cool">Frío</li>
        </ul>
      </div>
    </div>
  </header>

  <!-- Input y selects flotantes para tarea -->
  <div class="flex flex-col gap-2 mb-4">
    <input id="taskInput" type="text" placeholder="Escribe una nueva tarea..." class="input-task">
    <div class="flex gap-2">
      <div class="relative flex-1">
        <button id="categoryBtn" class="w-full text-left px-3 py-1 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white flex justify-between items-center">
          Categoría: General
          <span class="ml-2">▾</span>
        </button>
        <ul id="categoryDropdown" class="absolute z-10 hidden w-full mt-1 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded shadow-lg overflow-hidden transition-all">
          <li class="px-3 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer" data-value="General">General</li>
          <li class="px-3 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer" data-value="Trabajo">Trabajo</li>
          <li class="px-3 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer" data-value="Estudio">Estudio</li>
          <li class="px-3 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer" data-value="Personal">Personal</li>
        </ul>
      </div>

      <div class="relative flex-1">
        <button id="priorityBtn" class="w-full text-left px-3 py-1 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white flex justify-between items-center">
          Prioridad: Urgente
          <span class="ml-2">▾</span>
        </button>
        <ul id="priorityDropdown" class="absolute z-10 hidden w-full mt-1 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded shadow-lg overflow-hidden transition-all">
          <li class="px-3 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer" data-value="urgente">Urgente</li>
          <li class="px-3 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer" data-value="progreso">En progreso</li>
          <li class="px-3 py-1 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer" data-value="opcional">Opcional</li>
        </ul>
      </div>

      <button id="addBtn" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition">Añadir</button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="flex gap-2 mb-4 filters">
    <button data-filter="all" class="flex-1 py-1 bg-gray-200 rounded hover:bg-gray-300 transition">Todas</button>
    <button data-filter="pending" class="flex-1 py-1 bg-gray-200 rounded hover:bg-gray-300 transition">Pendientes</button>
    <button data-filter="completed" class="flex-1 py-1 bg-gray-200 rounded hover:bg-gray-300 transition">Completadas</button>
  </div>

  <!-- Lista de tareas -->
  <ul id="taskList" class="space-y-2"></ul>

  <!-- Contador -->
  <div class="text-center mt-4 text-gray-700 dark:text-gray-300">
    Tareas pendientes: <span id="taskCounter">0</span>
  </div>

  <footer class="text-center mt-6 text-sm text-gray-500 dark:text-gray-400">
    Gestor de Tareas
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
