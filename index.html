<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Tareas</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="theme-default min-h-screen flex items-center justify-center transition-colors duration-500">

<div class="container bg-white dark:bg-gray-900 w-full max-w-sm p-8 rounded-xl shadow-2xl transition-colors duration-500">
  <!-- Header -->
  <header class="text-center mb-6">
    <h1 class="text-2xl font-semibold text-gray-800 dark:text-gray-100">Gestor de Tareas</h1>
    <p class="text-sm text-gray-500 dark:text-gray-300 mb-2">Organiza tu día de forma eficiente</p>
    <div class="flex justify-center gap-2 mb-2">
      <button id="darkModeBtn" class="px-3 py-1 bg-gray-800 text-white rounded hover:bg-gray-700 transition">🌙 Modo oscuro</button>
      <select id="themeSelector" class="select-theme">
        <option value="default">Predeterminado</option>
        <option value="warm">Cálido</option>
        <option value="cool">Frío</option>
      </select>
    </div>
  </header>

  <!-- Input y selectores -->
  <div class="flex flex-col gap-2 mb-4">
    <input id="taskInput" type="text" placeholder="Escribe una nueva tarea..." class="input-task">
    <div class="flex gap-2">
      <select id="categorySelector" class="select-task">
        <option value="General">General</option>
        <option value="Trabajo">Trabajo</option>
        <option value="Estudio">Estudio</option>
        <option value="Personal">Personal</option>
      </select>
      <select id="prioritySelector" class="select-task">
        <option value="urgente">Urgente</option>
        <option value="progreso">En progreso</option>
        <option value="opcional">Opcional</option>
      </select>
      <button id="addBtn" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition">Añadir</button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="flex gap-2 mb-4 filters">
    <button data-filter="all" class="flex-1 py-1 bg-gray-200 rounded hover:bg-gray-300 transition">Todas</button>
    <button data-filter="pending" class="flex-1 py-1 bg-gray-200 rounded hover:bg-gray-300 transition">Pendientes</button>
    <button data-filter="completed" class="flex-1 py-1 bg-gray-200 rounded hover:bg-gray-300 transition">Completadas</button>
  </div>

  <!-- Lista de tareas -->
  <ul id="taskList" class="space-y-2"></ul>

  <!-- Contador -->
  <div class="text-center mt-4 text-gray-700 dark:text-gray-300">
    Tareas pendientes: <span id="taskCounter">0</span>
  </div>

  <footer class="text-center mt-6 text-sm text-gray-500 dark:text-gray-400">
    Gestor de Tareas
</div>

<script src="app.js"></script>
</body>
</html>
