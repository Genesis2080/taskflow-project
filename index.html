<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Tareas - Tailwind</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-pink-300 via-purple-300 to-indigo-400 min-h-screen flex items-center justify-center transition-colors duration-500">

<div class="container bg-white dark:bg-gray-800 w-full max-w-sm p-8 rounded-xl shadow-2xl transition-colors duration-500">
  <!-- Header -->
  <header class="text-center mb-6">
    <h1 class="text-2xl font-semibold text-gray-800 dark:text-gray-100">Gestor de Tareas</h1>
    <p class="text-sm text-gray-500 dark:text-gray-300 mb-2">Organiza tu día de forma eficiente</p>
    <button id="darkModeBtn" class="px-3 py-1 bg-gray-800 dark:bg-gray-200 text-white dark:text-gray-800 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 hover:bg-gray-700 dark:hover:bg-gray-300 transition">🌙 Modo oscuro</button>
  </header>

  <!-- Input de nueva tarea -->
  <div class="flex gap-2 mb-4">
    <input id="taskInput" type="text" placeholder="Escribe una nueva tarea..." 
           class="flex-1 p-2 border-2 border-gray-200 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 transition bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
    <button id="addBtn" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 dark:bg-blue-400 dark:hover:bg-blue-500 transition">Añadir</button>
  </div>

  <!-- Filtros -->
  <div class="flex gap-2 mb-4 filters">
    <button data-filter="all" class="flex-1 py-1 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition">Todas</button>
    <button data-filter="pending" class="flex-1 py-1 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition">Pendientes</button>
    <button data-filter="completed" class="flex-1 py-1 bg-gray-200 dark:bg-gray-700 rounded hover:bg-gray-300 dark:hover:bg-gray-600 transition">Completadas</button>
  </div>

  <!-- Lista de tareas -->
  <ul id="taskList" class="space-y-2"></ul>

  <!-- Contador -->
  <div class="text-center mt-4 text-gray-700 dark:text-gray-300">
    Tareas pendientes: <span id="taskCounter">0</span>
  </div>

  <footer class="text-center mt-6 text-sm text-gray-500 dark:text-gray-400">
    Gestor de Tareas • Aplicación Tailwind
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
