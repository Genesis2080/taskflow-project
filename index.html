<!DOCTYPE html>
<html lang="es" class="transition-colors duration-500">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Gestor de Tareas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="card w-full max-w-sm p-6 rounded-2xl">

    <!-- ── Cabecera ─────────────────────────────────────────────── -->
    <header class="mb-5">
      <div class="flex items-center justify-between mb-1">
        <h1 class="brand text-2xl text-gray-900 dark:text-white">TaskFlow</h1>
        <button id="darkModeBtn" class="toggle-pill" aria-label="Cambiar tema">
          <span id="darkIcon">🌙</span>
          <span id="darkLabel">Noche</span>
        </button>
      </div>
      <p class="text-xs text-gray-500 dark:text-gray-400">Organiza tu día de forma eficiente</p>
    </header>

    <!-- ── Formulario de nueva tarea ────────────────────────────── -->
    <section aria-label="Añadir tarea" class="flex flex-col gap-2 mb-4">

      <div>
        <input id="taskInput" type="text" maxlength="120"
          placeholder="¿Qué tienes que hacer hoy?"
          class="field" aria-label="Nombre de la tarea" autocomplete="off" />
        <p class="field-error-msg" id="inputError">El nombre de la tarea no puede estar vacío.</p>
      </div>

      <div class="flex gap-2">
        <select id="categorySelector" class="field" aria-label="Categoría">
          <option value="General">📋 General</option>
          <option value="Trabajo">💼 Trabajo</option>
          <option value="Estudio">📚 Estudio</option>
          <option value="Personal">🏠 Personal</option>
        </select>

        <select id="prioritySelector" class="field" aria-label="Prioridad">
          <option value="urgent">🔴 Urgente</option>
          <option value="progress">🟡 En progreso</option>
          <option value="optional">🟢 Opcional</option>
        </select>
      </div>

      <!-- ── Campo de fecha límite (NUEVO) ─────────────────────── -->
      <div class="due-date-row">
        <label for="dueDateInput" class="due-date-label">
          📅 Fecha límite <span class="due-date-optional">(opcional)</span>
        </label>
        <input id="dueDateInput" type="date" class="field due-date-field"
               aria-label="Fecha límite de la tarea" />
      </div>

      <button id="addBtn" class="btn-primary">+ Añadir tarea</button>
    </section>

    <!-- ── Filtros ───────────────────────────────────────────────── -->
    <nav aria-label="Filtros de tareas" class="flex gap-2 mb-4">
      <button class="filter-btn active" data-filter="all">Todas</button>
      <button class="filter-btn" data-filter="pending">Pendientes</button>
      <button class="filter-btn" data-filter="completed">Completadas</button>
    </nav>

    <!-- ── Lista de tareas ───────────────────────────────────────── -->
    <ul id="taskList" role="list" aria-label="Lista de tareas"
        class="space-y-2 max-h-72 overflow-y-auto pr-0.5"></ul>

    <!-- ── Contador ──────────────────────────────────────────────── -->
    <footer class="flex justify-center mt-4">
      <div class="counter-chip">
        <span>⏳</span>
        <span id="taskCounter">0</span>
        <span>pendiente(s)</span>
      </div>
    </footer>

    <!-- ── Botón estadísticas ────────────────────────────────────── -->
    <div class="flex justify-center mt-3">
      <button id="statsBtn" class="stats-toggle-btn" aria-expanded="false" aria-controls="statsPanel">
        <span id="statsIcon">📊</span>
        <span>Estadísticas</span>
      </button>
    </div>

    <!-- ── Panel de estadísticas (desplegable) ───────────────────── -->
    <div id="statsPanel" class="stats-panel" aria-live="polite"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
